<DOCTYPE HTML>
    <HTML LANG="RU">
    <HEAD>
        <meta charset="UTF-8">
        <meta  name="vierport" content="width=device-width, initial-scale=1.0, user-scalable=no">
        <title> Найди пару | Memory game</title>
        <link rel="stylesheet" href="style.css">
    </HEAD>
    <body>
    <div class="game-container">
        <header class="game-header">
            <h1>🧠 Найди пару</h1>
            <div class="stats">
                <div class="score-box">
                    <span> 🏆 Очки: </span>
                    <span id="scoreValue">0</span>
                </div>
                <div class="attempts-box">
                    <span>🔃 Попытки: </span>
                    <span id="attemptsValue">0</span>
                </div>
            </div>
            <button id="resetGameBtn" class="reset-btn">🕐 Новая игра </button>
        </header>

        <div class="difficulty-panel">
            <label> Сложность: </label>
            <select id="difficultySelect">
                <option value="easy">Легкая (4*3) </option>
                <option value="medium">Средняя (4*4) </option>
                <option value="hard">Сложная (6*4) </option>
            </select>
        </div>

        <div class="game-board" id="gameBoard">
        </div>

        <div class="game-message" id="gameMessage"></div>
    </div>

    <script src="game.js"></script>
    </body>
    </HTML>
